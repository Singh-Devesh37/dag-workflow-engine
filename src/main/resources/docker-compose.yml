services:
  postgres:
    image: postgres:15
    container_name: workflow_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-workflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-workflow}
      POSTGRES_DB: ${DB_NAME:-workflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  workflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: workflow
      DB_USER: workflow
      DB_PASSWORD: workflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: always


volumes:
  postgres-data:

